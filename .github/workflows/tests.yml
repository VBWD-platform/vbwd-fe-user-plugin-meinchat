name: Tests

on:
  push:
    branches: ['*']
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout plugin
        uses: actions/checkout@v4
        with:
          path: plugin-src

      - name: Checkout vbwd-fe-user
        uses: actions/checkout@v4
        with:
          repository: VBWD-platform/vbwd-fe-user
          path: vbwd-fe-user
          submodules: recursive

      - name: Overlay plugin source
        run: cp -r plugin-src/. vbwd-fe-user/plugins/meinchat/

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: vbwd-fe-user/package-lock.json

      - name: Build vbwd-fe-core submodule
        run: |
          cd vbwd-fe-user/vbwd-fe-core
          npm install
          npm run build

      - name: Install dependencies
        run: |
          cd vbwd-fe-user
          npm install

      - name: Run plugin tests (Vitest unit/integration; Playwright e2e excluded)
        run: |
          cd vbwd-fe-user
          unit_test_files=$(find plugins/meinchat \( -name "*.spec.ts" -o -name "*.test.ts" \) -not -path "*/tests/e2e/*" 2>/dev/null)
          if [ -n "$unit_test_files" ]; then
            npx vitest run plugins/meinchat/tests/ --exclude='**/tests/e2e/**' --reporter=verbose
          else
            echo "No Vitest unit/integration tests found for meinchat — skipping (any e2e specs run by Playwright separately)."
          fi

      - name: Project-wide ESLint
        run: |
          cd vbwd-fe-user
          npm run lint

      - name: Project-wide vue-tsc
        run: |
          cd vbwd-fe-user
          npx vue-tsc --noEmit
